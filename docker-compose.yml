version: "3.8"

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ['net']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - OLLAMA_HOST=${OLLAMA_HOST:-llm:11434}
  env_file:
    - path: .env
      required: true

services:
  llm:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    command: ["serve"]
    networks:
      - net


  pull-model:
    image: genai-stack/pull-model:latest
    build:
      context: .
      dockerfile: pull_model.Dockerfile
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://llm:11434
      - LLM=${LLM}
    networks:
      - net
    depends_on:
      - llm
    tty: true

  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    environment:
      - OLLAMA_BASE_URL=http://llm:11434
      - LLM=${LLM}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
    volumes:
      - .:/app
    networks:
      - net
    depends_on:
      - pull-model
    ports:
      - "8504:8504"

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: telegram_bot.Dockerfile
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://llm:11434
      - LLM=${LLM}
      - CHANNEL_ID=${CHANNEL_ID}
      - ADMIN_ID=${ADMIN_ID}
      - TOKEN=${TOKEN}
    volumes:
      - ./telegram_bot:/app
    networks:
      - net
    ports:
      - "8506:8506"
    depends_on:
      - pull-model

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    networks: ['net']
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - "n8n import:credentials --separate --input=/net-data/credentials && n8n import:workflow --separate --input=/net-data/workflows"
    volumes:
      - ./n8n/demo-data:/net-data
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/net-data
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: ['net']
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  ollama_data:
  n8n_storage:
  postgres_data:
  qdrant_storage:

networks:
  net:
    name: net
    driver: bridge
